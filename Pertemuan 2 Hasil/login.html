<!DOCTYPE html>
<html lang="en" style="height: 100%; margin: -7px;">

<head>
    <meta charset="UTF-8">
    <title>ZaxchTodo</title>
    <link rel="icon" href="/public/logo-dark.png">

    <link rel="stylesheet" href="assets/style.css">

</head>

<body>
    <main>
        <section class="form-section1">
            <h1 class="title">ZaxchTodo</h1>
            <h1 class="subtitle">Welcome Back!</h1>

            <div class="form">
                <form action="" method="get">
                    <div>
                        <label for="email">Email</label>
                        <input type="email" name="email" id="email" placeholder="Email">
                    </div>
        
                    <div>
                        <label for="password">Password</label>
                        <input type="password" name="password" id="password" placeholder="Password">
                    </div>

                    <div class="form-btn">
                        <input type="submit" name="" id="" value="Login">
                    </div>
                </form>
            </div>
        </section>
        
        <section class="form-section2">
            <div class="logo">
                <img src="public/logo.png" alt="Logo" >
            </div>
            <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Sunt excepturi reiciendis reprehenderit rem quo molestias</p>
        </section>
    </main>
</body>
</html>
